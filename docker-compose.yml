# docker-compose.yml
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: shelf
      POSTGRES_PASSWORD: shelf
      POSTGRES_DB: mediashelf
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U shelf -d mediashelf']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
